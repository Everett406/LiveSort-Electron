<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveSort</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f3f1eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #333;
    }
    .loader {
      text-align: center;
      max-width: 520px;
      padding: 0 20px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(249, 115, 22, 0.15);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
    .hint {
      margin-top: 24px;
      font-size: 11px;
      color: #bbb;
    }
    .timer {
      margin-top: 12px;
      font-size: 12px;
      color: #f97316;
      font-variant-numeric: tabular-nums;
    }
    .log-box {
      margin-top: 20px;
      text-align: left;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      color: #666;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .log-box:empty { display: none; }
    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>LiveSort</h1>
    <p>正在启动后端服务，请稍候...</p>
    <p class="hint">首次启动可能需要 1–3 分钟<br>（杀毒软件扫描中，请耐心等待）</p>
    <p class="timer" id="timer">已等待 0 秒</p>
    <div class="log-box" id="logBox"></div>
  </div>
  <script>
    const start = Date.now();
    const timerEl = document.getElementById('timer');
    const logBox = document.getElementById('logBox');
    const maxLines = 30;
    const lines = [];

    setInterval(() => {
      const secs = Math.floor((Date.now() - start) / 1000);
      const m = Math.floor(secs / 60).toString().padStart(2, '0');
      const s = (secs % 60).toString().padStart(2, '0');
      timerEl.textContent = '已等待 ' + m + ':' + s;
    }, 1000);

    if (window.electronAPI && window.electronAPI.onBackendLog) {
      window.electronAPI.onBackendLog((line) => {
        lines.push(line);
        if (lines.length > maxLines) lines.shift();
        logBox.innerHTML = lines.map(l => '<div class="log-line">' + escapeHtml(l) + '</div>').join('');
        logBox.scrollTop = logBox.scrollHeight;
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
